<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S ❤️ A | Arambikalama? 😎</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff4d6d;
            --soft-pink: #fff0f3;
            --text-main: #2c3e50;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #fef1f3 0%, #fffbf2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .main-card {
            width: 92%;
            max-width: 420px;
            background: var(--glass-white);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 77, 109, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
        }

        h2 { font-family: 'Playfair Display', serif; color: var(--text-main); font-size: 1.8rem; margin-bottom: 20px; }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            margin: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .yes { background: var(--accent); color: white; box-shadow: 0 6px 20px rgba(255, 77, 109, 0.3); }
        .no { background: white; color: #95a5a6; border: 1px solid #eee; position: relative; }

        .hidden { display: none; }
        .invisible { visibility: hidden; opacity: 0; height: 0; margin: 0; transition: 0.3s; }
        .visible { visibility: visible; opacity: 1; height: 220px; margin: 20px 0; }

        .media-viewer {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #eee;
        }

        .media-gif { width: 100%; height: 100%; object-fit: cover; }

        .countdown-modern { display: flex; justify-content: center; gap: 10px; margin-top: 25px; }
        .box-time { background: white; border-radius: 12px; padding: 10px; min-width: 60px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .box-time span { display: block; font-size: 1.1rem; font-weight: 700; color: var(--accent); }
        .box-time small { font-size: 0.6rem; color: #999; text-transform: uppercase; }

        .confetti { position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="start">
        <h2 style="font-size: 2.2rem; margin-bottom: 10px;">Arambikalama? 😎</h2>
        
        <div class="media-viewer" style="height: 200px; margin-bottom: 20px;">
            <img class="media-gif" src="./images/first.gif" alt="Starting...">
        </div>

        <p style="color: #7f8c8d; margin-bottom: 30px;">Engagement mudinjachu... formal-ah pesi aachu... <br> <b>Ippo unmai-ah pesalama?</b></p>
        <button class="btn yes" onclick="beginQuiz()">Polam Right! 🚀</button>
    </div>

    <div id="quiz" class="hidden">
        <h3 id="question" style="color: var(--text-main); font-family: 'Playfair Display'; min-height: 80px; font-size: 1.15rem;"></h3>
        
        <div id="mediaArea" class="media-viewer invisible">
            <img id="gifBox" class="media-gif" src=""/>
        </div>

        <div id="reaction" style="color: var(--accent); font-weight: 600; min-height: 25px; margin-bottom: 10px; font-size: 0.95rem;"></div>
        
        <div id="btns">
            <button class="btn yes" onclick="handleInput('yes')">Kandipa! ❤️</button>
            <button id="noBtn" class="btn no" onmouseenter="checkEvade()" onclick="handleInput('no')">No 😜</button>
        </div>
    </div>

    <div id="final" class="hidden">
        <h2 id="finalTitle">Sari, Ellaam Okay...</h2>
        <div id="finalDecision">
            <p style="color: #666;">Arranged marriage-nu formal-ah mudika vendam...</p>
            <h1 style="font-family: 'Playfair Display'; font-size: 1.8rem; color: var(--accent); margin-top: 0;">Arun, Will You Marry Me? 💍</h1>
            <button class="btn yes" onclick="acceptFinal()">YES, I WILL! ❤️</button>
        </div>

        <div id="marriageDetails" class="hidden">
            <div class="media-viewer visible">
                <img class="media-gif" style="object-fit: contain; padding: 10px;" 
                src="https://img.freepik.com/premium-vector/adorable-indian-wedding-couple-cartoon-bride-red-saree-groom-cream-sherwani-holding-hand_1153643-497.jpg?w=740">
            </div>
            <h3 style="color: var(--accent); margin-top: 0; font-family: 'Playfair Display';">😎 Maatnada bambara katta mandaya!</h3>
            <div class="countdown-modern">
                <div class="box-time"><span id="d"></span><small>Days</small></div>
                <div class="box-time"><span id="h"></span><small>Hrs</small></div>
                <div class="box-time"><span id="m"></span><small>Min</small></div>
                <div class="box-time"><span id="s"></span><small>Sec</small></div>
            </div>
        </div>
    </div>
</div>

<script>
const steps = [
    { 
        q: "Engagement-ku munnadi, en photos-ah zoom panni panni 'Stalk' pannirukingala? 😉",
        yesMsg: "Hahaha.. Maatnikingala! 😂", yesGif: "./images/ques1yes.gif",
        noMsg: "Poi sollatheenga!🤨 Apo Pakala en photova", noGif: "./images/ques1no.gif"
    },  
    { 
        q: "Naan senja sapadu sumaar-ah irunthalum, 'Chef Damu range-ku iruku' nu poi solluvinga la? 🥘😉",
        yesMsg: "Ayyoo.. samathu! Happy-o happy! ❤️", yesGif: "./images/ques2yes.gif",
        noMsg: "Saptu dhaan aaganum.. vera vazhi illa! 😤", noGif: "./images/ques2no.gif"
    },
    { 
        q: "Kalyanathuku apuram shopping ku koopta, moonja thooki vechikama kooda varuvinga la? 🛍️",
        yesMsg: "Adhu dhaan nalla payyanuku azhagu! 🥰", yesGif: "./images/ques3yes.gif",
        noMsg: "Ungaluku credit card bill vara pothu paarunga! 👊", noGif: "./images/ques3no.gif"
    },
    { 
        q: "Marriage-ku apram sandai vantha, apovachum 'SORRY' soluvingala? 🥺🙏",
        evade: true,
        yesMsg: "Idha naan record panniten! Marakathinga! ✨", yesGif: "./images/ques4yes.gif",
        noMsg: "Escape-e illa boss! 😜", noGif: "./images/ques4no.gif"
    },
    { 
        q: "Morning seekiram enthirichi enakku tea pottu tharuva-la? (Illana late-ah enthirikalama? 😴)",
        yesMsg: "Rendu perum serndhu thoongalam! deal! 🤝", yesGif: "./images/ques5yes.gif",
        noMsg: "Enakku tea venume! 🥺", noGif: "./images/ques5no.gif"
    },
    { 
        q: "Last-ah oru kelvi... Intha veetula eppovum 'Pondatti solra dhaan Vedha vaakku' nu follow pannuva-la? 👑😈",
        yesMsg: "Correct! Life-long happy-ah irukalam! 😍", yesGif: "./images/ques6yes.gif",
        noMsg: "No lam solla kudathu! 😂", noGif: "./images/ques6no.gif"
    }
];

let currentStep = 0;
let isWaiting = false;

function beginQuiz() {
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    renderStep();
}

function renderStep() {
    isWaiting = false;
    document.getElementById("question").innerText = steps[currentStep].q;
    document.getElementById("mediaArea").className = "media-viewer invisible";
    document.getElementById("reaction").innerText = "";
    document.getElementById("noBtn").style.transform = "translate(0,0)";
}

function handleInput(choice) {
    if(isWaiting) return;

    const mediaArea = document.getElementById("mediaArea");
    const gifBox = document.getElementById("gifBox");
    const reaction = document.getElementById("reaction");
    const data = steps[currentStep];

    if(choice === 'yes') {
        isWaiting = true;
        reaction.innerText = data.yesMsg;
        gifBox.src = data.yesGif;
        mediaArea.className = "media-viewer visible";
        setTimeout(nextStep, 2000);
    } else {
        reaction.innerText = data.noMsg;
        gifBox.src = data.noGif;
        mediaArea.className = "media-viewer visible";
        if(data.evade) evadeNo();
    }
}

function nextStep() {
    currentStep++;
    if(currentStep < steps.length) {
        renderStep();
    } else {
        document.getElementById("quiz").classList.add("hidden");
        document.getElementById("final").classList.remove("hidden");
    }
}

function checkEvade() {
    if(steps[currentStep].evade) evadeNo();
}

function evadeNo() {
    const btn = document.getElementById("noBtn");
    btn.style.transform = `translate(${Math.random() * 160 - 80}px, ${Math.random() * 160 - 80}px)`;
}

function acceptFinal() {
    document.getElementById("finalDecision").classList.add("hidden");
    document.getElementById("finalTitle").innerText = "Locked & Loaded! ❤️";
    document.getElementById("marriageDetails").classList.remove("hidden");
    startConfetti();
}

function startConfetti() {
    for(let i=0; i<80; i++) {
        const conf = document.createElement('div');
        conf.style.cssText = `position:fixed; width:10px; height:10px; top:-10px; left:${Math.random()*100}vw; background:${['#ff4d6d','#ffb3c1','#fad0c4'][Math.floor(Math.random()*3)]}; border-radius:50%; pointer-events:none; z-index:9999;`;
        document.body.appendChild(conf);
        
        const animation = conf.animate([
            { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
            { transform: `translateY(110vh) rotate(360deg)`, opacity: 0 }
        ], { duration: Math.random() * 2000 + 1000, easing: 'linear' });
        
        animation.onfinish = () => conf.remove();
    }
}

const targetDate = new Date("May 18, 2026 06:00:00").getTime();
setInterval(() => {
    const now = new Date().getTime();
    const diff = targetDate - now;
    if (diff < 0) return;
    document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("h").innerText = Math.floor((diff / (1000 * 60 * 60)) % 24);
    document.getElementById("m").innerText = Math.floor((diff / (1000 * 60)) % 60);
    document.getElementById("s").innerText = Math.floor((diff / 1000) % 60);
}, 1000);
</script>
</body>
</html>
